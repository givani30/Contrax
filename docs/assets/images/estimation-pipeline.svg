<svg width="1400" height="340" viewBox="0 0 1400 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="est-bg" x1="0" y1="0" x2="1400" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FCFC"/>
      <stop offset="1" stop-color="#EEF7F6"/>
    </linearGradient>
    <filter id="est-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#12313C" flood-opacity="0.10"/>
    </filter>
    <marker id="est-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#0F766E"/>
    </marker>
  </defs>

  <rect width="1400" height="340" rx="28" fill="url(#est-bg)"/>
  <circle cx="1188" cy="70" r="88" fill="#F59E0B" fill-opacity="0.08"/>
  <circle cx="106" cy="286" r="78" fill="#0F766E" fill-opacity="0.06"/>

  <text x="58" y="54" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="28" font-weight="700">
    Estimation workflow
  </text>
  <text x="58" y="86" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">
    Filters, smoothers, and horizon objectives share the same model and noise assumptions.
  </text>

  <g filter="url(#est-shadow)">
    <rect x="58" y="136" width="220" height="110" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="125" y="172" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Model + data</text>
    <text x="90" y="199" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="90" dy="0">system, Q, R</tspan>
      <tspan x="90" dy="22">measurements, inputs</tspan>
    </text>

    <rect x="336" y="136" width="228" height="110" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="393" y="172" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Batch filter</text>
    <text x="380" y="199" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="380" dy="0">kalman(), ekf()</tspan>
      <tspan x="380" dy="22">ukf()</tspan>
    </text>

    <rect x="622" y="136" width="228" height="110" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="671" y="172" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Filtered result</text>
    <text x="666" y="199" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="666" dy="0">state estimate</tspan>
      <tspan x="666" dy="22">covariance, innovations</tspan>
    </text>

    <rect x="908" y="136" width="192" height="110" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="958" y="172" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">Smoother</text>
    <text x="958" y="199" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="958" dy="0">rts()</tspan>
      <tspan x="958" dy="22">uks()</tspan>
    </text>

    <rect x="1158" y="136" width="184" height="110" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="1221" y="172" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">MHE</text>
    <text x="1198" y="199" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="1198" dy="0">mhe_objective()</tspan>
      <tspan x="1198" dy="22">mhe()</tspan>
    </text>
  </g>

  <path d="M278 191H336" stroke="#0F766E" stroke-width="4" stroke-linecap="round" marker-end="url(#est-arrow)"/>
  <path d="M564 191H622" stroke="#0F766E" stroke-width="4" stroke-linecap="round" marker-end="url(#est-arrow)"/>
  <path d="M850 191H908" stroke="#0F766E" stroke-width="4" stroke-linecap="round" marker-end="url(#est-arrow)"/>

  <path d="M736 246V284H1250V246" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>
  <path d="M1250 246L1238 221" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>
  <path d="M1250 246L1262 221" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>

  <text x="864" y="307" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">
    filtered trajectories can warm-start the horizon solve
  </text>
</svg>
