<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cl-bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FCFC"/>
      <stop offset="1" stop-color="#EDF7F6"/>
    </linearGradient>
    <linearGradient id="cl-accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#164E63"/>
    </linearGradient>
    <filter id="cl-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#12313C" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="430" rx="28" fill="url(#cl-bg)"/>
  <circle cx="1080" cy="62" r="95" fill="#F59E0B" fill-opacity="0.08"/>
  <circle cx="102" cy="362" r="88" fill="#0F766E" fill-opacity="0.07"/>

  <text x="64" y="56" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="28" font-weight="700">
    Closed-loop control and estimation in one JAX program
  </text>
  <text x="64" y="90" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">
    Keep the plant model, controller design, simulation, and estimator on one shared state-space story.
  </text>

  <g filter="url(#cl-shadow)">
    <rect x="118" y="180" width="186" height="94" rx="20" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="157" y="216" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="23" font-weight="700">Controller</text>
    <text x="146" y="243" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="146" dy="0">lqr(), lqi()</tspan>
      <tspan x="146" dy="22">place()</tspan>
    </text>

    <rect x="492" y="146" width="226" height="128" rx="20" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="549" y="182" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="23" font-weight="700">Plant / model</text>
    <text x="538" y="209" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="538" dy="0">ContLTI, DiscLTI</tspan>
      <tspan x="538" dy="22">NonlinearSystem</tspan>
      <tspan x="538" dy="22">PHSSystem</tspan>
    </text>

    <rect x="906" y="180" width="194" height="94" rx="20" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="958" y="216" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="23" font-weight="700">Estimator</text>
    <text x="946" y="243" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="946" dy="0">kalman(), ekf()</tspan>
      <tspan x="946" dy="22">ukf()</tspan>
    </text>
  </g>

  <rect x="420" y="320" width="360" height="62" rx="16" fill="url(#cl-accent)" fill-opacity="0.10" stroke="#0F766E" stroke-opacity="0.18"/>
  <text x="470" y="347" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="19" font-weight="700">
    <tspan x="470" dy="0">simulate(), linearize(), c2d()</tspan>
    <tspan x="470" dy="22">rts(), uks()</tspan>
  </text>

  <circle cx="78" cy="228" r="27" fill="white" stroke="#F59E0B" stroke-width="3"/>
  <text x="65" y="235" fill="#B45309" font-family="IBM Plex Sans, Arial, sans-serif" font-size="23" font-weight="700">r</text>
  <path d="M105 228H118" stroke="#B45309" stroke-width="4" stroke-linecap="round"/>

  <path d="M304 228H492" stroke="#0F766E" stroke-width="4" stroke-linecap="round"/>
  <path d="M718 228H906" stroke="#0F766E" stroke-width="4" stroke-linecap="round"/>
  <path d="M1003 180V128C1003 112 990 99 974 99H301C285 99 272 112 272 128V180" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>
  <path d="M272 180L260 156" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>
  <path d="M272 180L284 156" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>

  <text x="755" y="216" fill="#0F766E" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700">y</text>
  <text x="390" y="216" fill="#0F766E" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700">u</text>
  <text x="561" y="120" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="19" font-weight="700">x_hat closes the loop</text>
</svg>
