<svg width="1320" height="420" viewBox="0 0 1320 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="out-bg" x1="0" y1="0" x2="1320" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FCFC"/>
      <stop offset="1" stop-color="#EEF7F6"/>
    </linearGradient>
    <filter id="out-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#12313C" flood-opacity="0.10"/>
    </filter>
    <marker id="out-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#0F766E"/>
    </marker>
  </defs>

  <rect width="1320" height="420" rx="28" fill="url(#out-bg)"/>
  <circle cx="1152" cy="78" r="88" fill="#F59E0B" fill-opacity="0.08"/>
  <circle cx="112" cy="330" r="80" fill="#0F766E" fill-opacity="0.06"/>

  <text x="58" y="56" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="28" font-weight="700">
    State feedback inside an output-feedback loop
  </text>
  <text x="58" y="88" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">
    The controller uses a state estimate when the full state is not measured directly.
  </text>

  <g filter="url(#out-shadow)">
    <rect x="136" y="188" width="192" height="96" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="183" y="224" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="23" font-weight="700">Controller</text>
    <text x="182" y="251" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="182" dy="0">u = -K x_hat</tspan>
    </text>

    <rect x="528" y="154" width="244" height="128" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="617" y="190" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="23" font-weight="700">Plant</text>
    <text x="570" y="217" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="570" dy="0">state x, output y</tspan>
      <tspan x="570" dy="22">simulate(), state_feedback()</tspan>
    </text>

    <rect x="972" y="188" width="208" height="96" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="1028" y="224" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="23" font-weight="700">Estimator</text>
    <text x="1008" y="251" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="1008" dy="0">kalman(), ekf()</tspan>
      <tspan x="1008" dy="22">ukf()</tspan>
    </text>
  </g>

  <circle cx="82" cy="236" r="28" fill="white" stroke="#F59E0B" stroke-width="3"/>
  <text x="68" y="243" fill="#B45309" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">r</text>
  <path d="M110 236H136" stroke="#B45309" stroke-width="4" stroke-linecap="round"/>

  <path d="M328 236H528" stroke="#0F766E" stroke-width="4" stroke-linecap="round" marker-end="url(#out-arrow)"/>
  <path d="M772 236H972" stroke="#0F766E" stroke-width="4" stroke-linecap="round" marker-end="url(#out-arrow)"/>

  <path d="M1076 188V128C1076 112 1063 99 1047 99H320C304 99 291 112 291 128V188" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>
  <path d="M291 188L279 164" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>
  <path d="M291 188L304 164" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>

  <text x="410" y="224" fill="#0F766E" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700">u</text>
  <text x="850" y="224" fill="#0F766E" font-family="IBM Plex Sans, Arial, sans-serif" font-size="20" font-weight="700">y</text>
  <text x="604" y="120" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="19" font-weight="700">x_hat closes the loop</text>

  <rect x="286" y="316" width="740" height="54" rx="16" fill="#FFFFFF" stroke="#0F766E" stroke-opacity="0.18"/>
  <text x="352" y="348" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18" font-weight="700">
    state_feedback() is plant-side algebra; estimation is a separate layer
  </text>
</svg>
