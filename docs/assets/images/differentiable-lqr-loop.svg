<svg width="1400" height="340" viewBox="0 0 1400 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dl-bg" x1="0" y1="0" x2="1400" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FCFC"/>
      <stop offset="1" stop-color="#EEF7F6"/>
    </linearGradient>
    <filter id="dl-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#12313C" flood-opacity="0.10"/>
    </filter>
    <marker id="dl-arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#0F766E"/>
    </marker>
  </defs>

  <rect width="1400" height="340" rx="28" fill="url(#dl-bg)"/>
  <circle cx="1196" cy="70" r="86" fill="#F59E0B" fill-opacity="0.08"/>

  <text x="58" y="52" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="28" font-weight="700">
    Differentiable LQR tuning loop
  </text>
  <text x="58" y="84" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="18">
    Learn the design weights, solve for K inside the objective, then differentiate through the full rollout.
  </text>

  <g filter="url(#dl-shadow)">
    <rect x="58" y="140" width="188" height="110" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="108" y="176" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">log params</text>
    <text x="94" y="203" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="94" dy="0">theta_Q</tspan>
      <tspan x="94" dy="22">theta_R</tspan>
    </text>

    <rect x="290" y="140" width="216" height="110" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="354" y="176" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">weights</text>
    <text x="328" y="203" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="328" dy="0">Q = diag(exp(theta_Q))</tspan>
      <tspan x="328" dy="22">R = exp(theta_R)</tspan>
    </text>

    <rect x="550" y="140" width="148" height="110" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="592" y="176" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">lqr()</text>
    <text x="583" y="203" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="583" dy="0">solve for K</tspan>
    </text>

    <rect x="742" y="140" width="204" height="110" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="787" y="176" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">simulate()</text>
    <text x="785" y="203" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="785" dy="0">closed-loop</tspan>
      <tspan x="785" dy="22">rollout</tspan>
    </text>

    <rect x="990" y="140" width="160" height="110" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="1042" y="176" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">loss</text>
    <text x="1027" y="203" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="1027" dy="0">rollout cost</tspan>
    </text>

    <rect x="1194" y="140" width="148" height="110" rx="18" fill="white" stroke="#0F766E" stroke-opacity="0.22" stroke-width="2"/>
    <text x="1235" y="176" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="22" font-weight="700">grad</text>
    <text x="1222" y="203" fill="#12313C" font-family="IBM Plex Sans, Arial, sans-serif" font-size="16">
      <tspan x="1222" dy="0">parameter</tspan>
      <tspan x="1222" dy="22">update</tspan>
    </text>
  </g>

  <path d="M246 195H290" stroke="#0F766E" stroke-width="4" stroke-linecap="round" marker-end="url(#dl-arrow)"/>
  <path d="M506 195H550" stroke="#0F766E" stroke-width="4" stroke-linecap="round" marker-end="url(#dl-arrow)"/>
  <path d="M698 195H742" stroke="#0F766E" stroke-width="4" stroke-linecap="round" marker-end="url(#dl-arrow)"/>
  <path d="M946 195H990" stroke="#0F766E" stroke-width="4" stroke-linecap="round" marker-end="url(#dl-arrow)"/>
  <path d="M1150 195H1194" stroke="#0F766E" stroke-width="4" stroke-linecap="round" marker-end="url(#dl-arrow)"/>

  <path d="M1268 250V288C1268 302 1257 314 1242 314H162C147 314 136 302 136 288V250" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>
  <path d="M136 250L124 274" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>
  <path d="M136 250L149 274" stroke="#164E63" stroke-width="4" stroke-linecap="round"/>

  <text x="572" y="309" fill="#164E63" font-family="IBM Plex Sans, Arial, sans-serif" font-size="19" font-weight="700">
    value_and_grad closes the optimization loop
  </text>
</svg>
